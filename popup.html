<!DOCTYPE html>
<html>
<head>
    <title>Outlook Optimizer AI</title>
    <style>
        body { width: 300px; margin: 0; padding: 16px; background: #0f172a; color: white; font-family: Arial, Helvetica, sans-serif; }
        h2 { margin: 0 0 6px; }
        p { color: #94a3b8; font-size: 13px; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; margin-top: 8px; }
        button { width: 100%; padding: 11px; margin-top: 10px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; }
        #saveKeyBtn { background: #64748b; }
        #showBtn { background: #16a34a; }
        #aiBtn { background: #9333ea; }
        #currentBtn { background: #0ea5e9; }
        #scanBtn { background: #2563eb; }
        #hideBtn { background: #dc2626; }
        .small { font-size: 11px; color: #94a3b8; margin-top: 6px; }
    </style>
</head>
<body>
    <h2>Outlook Optimizer AI</h2>
    <p>Open an email in Outlook, then analyze it.</p>

    <input id="apiKeyInput" type="password" placeholder="Paste OpenAI API key for demo">
    <button id="saveKeyBtn">Save API Key</button>
    <div class="small">Class demo only. Do not ship production keys in a browser extension.</div>

    <button id="showBtn">Show Sidebar</button>
    <button id="aiBtn">AI Analyze Current Email</button>
    <button id="currentBtn">Rule Scan Current Email</button>
    <button id="scanBtn">Scan Visible Emails</button>
    <button id="hideBtn">Hide Sidebar</button>

    <script src="popup.js"></script>
</body>
</html>
